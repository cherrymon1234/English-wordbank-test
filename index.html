<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- header -->
    <header class="header">
        <!-- menu button -->
        <button id="menu-button" type="button">☰</button>
            
        <!-- header center -->
        <div class="header-center">
            <!-- title -->
            <h1 class="title">Word Test</h1>
        </div>
    </header>

    <!-- layer -->
    <div id="layer">
        <!-- on left menu-sidebar -->
        <aside id="menu-sidebar" class="sidebar-panel">
            <nav class="sidebar-menu">
                <a id="view-ranking">랭킹보기</a>
            </nav>
        </aside>
    </div>

    <!-- app -->
    <div id="app">
        <!-- main-container -->
        <main id="main-container">
            <!-- main-page -->
            <section id="select-page" class="page">
                <!-- nickname -->
                <div id="nickname">
                    <input type="text" id="nickname-input" placeholder="이름을 입력해주세요">
                </div>

                <!-- file -->
                <div id="file">
                    <div id="file-select">
                        <select id="wordsbank-select" required>
                            <option id="default-option" value="default-option" disabled selected>파일을 선택해주세요</option>
                        </select>
                    </div>

                    <div id="file-input">
                        <input type="file" id="wordsbank-input" accept=".txt,.csv">
                        <button type="submit" id="wordsbank-upload">업로드</button>
                    </div>
                </div>

                <!-- mode -->
                <div id="mode">
                    <select id="mode-select" required>
                        <option value="default-option" disabled selected>모드를 선택해주세요</option>
                        <option value="kor-to-eng">한 -> 영</option>
                        <option value="eng-to-kor">영 -> 한</option>
                        <option value="random">무작위</option>
                    </select>
                </div>

                <!-- questions-number -->
                <div id="questions-number">
                    <select id="questions-number-select" required>
                        <option value="default-option" disabled selected>총 문제 수를 선택해주세요</option>
                        <option value="30">30문제</option>
                        <option value="100">100문제</option>
                        <option value="200">200문제</option>
                        <option value="all">전체(단어장)</option>
                    </select>
                </div>

                <!-- exam start -->
                <div id="start">
                    <button id="start-button" type="button">시험 시작하기</button>
                </div>

            </section>

            <!-- exam-page -->
            <section id="exam-page" class="page">
                <!-- progress bar -->
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>

                <!-- question count -->
                <div id="question-count">
                    <h3 id="question-count-text">0/??</h3>
                </div>

                <!-- question -->
                <div id="question">
                    <h3 id="question-text">단어나 뜻</h3>
                </div>

                <!-- answer options -->
                <div id="answer-options">
                    <button type="button" class="answer-option" value="option1">option1</button>
                    <button type="button" class="answer-option" value="option2">option2</button>
                    <button type="button" class="answer-option" value="option3">option3</button>
                    <button type="button" class="answer-option" value="option4">option4</button>
                    <button type="button" class="answer-option" value="option5">option5</button>
                </div>
            </section>

            <!-- exam-result-page -->
            <section id="exam-result-page" class="page">
                <div id="exam-result">
                    <div class="exam-result">
                        단어장: <span id="selected-file">eng-words.txt</span>
                    </div>

                    <div class="exam-result">
                        모드: <span id="selected-mode">kor-to-eng</span>
                    </div>

                    <div class="exam-result">
                        맞은 개수: <span id="exam-score">10</span>
                    </div>

                    <div class="exam-result">
                        틀린 개수: <span id="exam-incorrect">20</span>
                    </div>

                    <div class="exam-result">
                        정답률: <span id="exam-accuracy">70%</span>
                    </div>

                    <div class="exam-result">
                        총 문제 수: <span id="exam-questionCount">30</span>
                    </div>
                </div>

                <div id="exam-result-page-buttons">
                    <button type="button" id="return-button">돌아가기</button>
                    <button type="button" id="replay-button">다시하기</button>
                    <button type="button" id="ranking-button">랭킹보기</button>
                </div>
            </section>

            <!-- ranking-page -->
            <section id="ranking-page" class="page">
                <!-- ranking-head -->
                <div class="ranking-head">
                    <button id="ranking-return-button" type="button">돌아가기</button>
                    <h2 id="ranking-title">랭킹</h2>

                    <div class="ranking-filters">
                        <div class="ranking-selected-file-text">
                            <select id="ranking-selected-file" required>
                                <option value="default-option" disabled selected>파일을 선택해주세요</option>
                            </select>
                        </div>

                        <div class="ranking-questionCount-text">
                            <select id="ranking-questionCount" required>
                                <option value="default-option" disabled selected>총 문제 수를 선택해주세요</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- ranking-list -->
                <div class="ranking-list" id="ranking-list">
                </div>
            </section>

            <!-- history-page -->
            <section id="history-page" class="page"></section>
        </main>
    </div>

    <script type="module" src="script/state.js"></script>
    <script type="module" src="script/DB/indexedDB.js"></script>
    <script type="module" src="script/DB/firebaseDB.js"></script>
    <script type="module" src="script/file.js"></script>
    <script type="module" src="script/page.js"></script>
    <script type="module" src="script/page/select-page.js"></script>
    <script type="module" src="script/page/exam-page.js"></script>
    <script type="module" src="script/page/exam-result-page.js"></script>
    <script type="module" src="script/page/ranking-page.js"></script>
    <script type="module" src="script/sidebar.js"></script>
</body>
</html>
